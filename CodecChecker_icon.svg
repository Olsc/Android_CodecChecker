<?xml version="1.0" encoding="utf-8"?>
<!--
  CodecChecker App Icon
  基于 108dp viewport 设计，与 Android 自适应图标一致
  前景 = 白，背景 = 靛蓝→深紫渐变
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="108" height="108" viewBox="0 0 108 108">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A237E" />
      <stop offset="100%" stop-color="#4A148C" />
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="108" height="108" fill="url(#bg)" rx="20" ry="20" />

  <!-- 播放键三角（视频/媒体） -->
  <polygon points="32,34 32,74 62,54" fill="#FFFFFF" />

  <!-- 波形柱 -->
  <rect x="72" y="45" width="4" height="18" fill="#FFFFFF" />
  <rect x="79" y="36" width="4" height="36" fill="#FFFFFF" />
  <rect x="86" y="41" width="4" height="26" fill="#FFFFFF" />

</svg>
